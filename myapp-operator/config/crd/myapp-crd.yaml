apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: myapps.app.gfnogueira.com
  annotations:
    description: "MyApp is a demo CRD managed by the myapp-operator"
spec:
  group: app.gfnogueira.com
  names:
    kind: MyApp
    listKind: MyAppList
    plural: myapps
    singular: myapp
    shortNames:
      - ma
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: MyApp is a simple application managed by the MyApp Operator.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: MyAppSpec defines the desired state of MyApp.
              type: object
              required:
                - image
                - replicas
              properties:
                replicas:
                  description: Number of desired pod replicas.
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 10
                  default: 1
                image:
                  description: Container image to deploy.
                  type: string
                  minLength: 1
                port:
                  description: Port the container listens on.
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 65535
                  default: 8080
                resources:
                  description: Resource limits for the container.
                  type: object
                  properties:
                    cpuLimit:
                      type: string
                    memoryLimit:
                      type: string
            status:
              description: MyAppStatus defines the observed state of MyApp.
              type: object
              properties:
                readyReplicas:
                  type: integer
                  format: int32
                availableReplicas:
                  type: integer
                  format: int32
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Failed
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                    required:
                      - type
                      - status
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Image
          type: string
          jsonPath: .spec.image
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
